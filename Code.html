<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChannelFinder</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #FF2D2D; --red-dark: #CC0000;
    --bg: #0A0A0A; --surface: #141414; --surface2: #1E1E1E;
    --border: rgba(255,255,255,0.08); --border-hover: rgba(255,255,255,0.16);
    --text: #F5F5F5; --muted: #888; --muted2: #555;
  }

  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    padding: 1.1rem 2rem; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 34px; height: 24px; background: var(--red); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
  .logo-icon::after { content: ''; border-left: 10px solid white; border-top: 6px solid transparent; border-bottom: 6px solid transparent; margin-left: 2px; }
  .logo-text { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; letter-spacing: -0.02em; }
  .logo-text span { color: var(--red); }

  .api-key-bar { display: flex; align-items: center; gap: 8px; flex: 1; max-width: 440px; }
  .api-key-bar label { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .api-input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 7px;
    padding: 7px 12px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px;
    outline: none; transition: border-color 0.2s; letter-spacing: 0.04em;
  }
  .api-input::placeholder { color: var(--muted2); letter-spacing: 0; }
  .api-input:focus { border-color: var(--red); }
  .api-status { font-size: 11px; white-space: nowrap; padding: 4px 10px; border-radius: 100px; }
  .api-status.ok { background: rgba(45,255,143,0.1); color: #2DFF8F; border: 1px solid rgba(45,255,143,0.2); }
  .api-status.err { background: rgba(255,45,45,0.1); color: #FF6B6B; border: 1px solid rgba(255,45,45,0.2); }

  .layout { display: grid; grid-template-columns: 264px 1fr; min-height: calc(100vh - 62px); }

  .sidebar {
    border-right: 1px solid var(--border); padding: 1.25rem;
    display: flex; flex-direction: column; gap: 1.25rem; overflow-y: auto;
  }
  .search-box { display: flex; gap: 8px; }
  .search-input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
    outline: none; transition: border-color 0.2s;
  }
  .search-input::placeholder { color: var(--muted2); }
  .search-input:focus { border-color: var(--red); }
  .search-btn {
    background: var(--red); border: none; border-radius: 8px; padding: 10px 14px; color: white;
    font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer;
    transition: background 0.2s, transform 0.1s; white-space: nowrap;
  }
  .search-btn:hover { background: var(--red-dark); }
  .search-btn:active { transform: scale(0.97); }
  .search-btn:disabled { background: var(--muted2); cursor: not-allowed; transform: none; }

  .filter-group { display: flex; flex-direction: column; gap: 0.55rem; }
  .filter-label { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
  .filter-row { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
  .filter-input {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px;
    outline: none; width: 100%; transition: border-color 0.2s;
  }
  .filter-input::placeholder { color: var(--muted2); font-size: 11px; }
  .filter-input:focus { border-color: var(--red); }
  .filter-hint { font-size: 11px; color: var(--muted2); line-height: 1.4; }

  .sort-select {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px;
    outline: none; width: 100%; cursor: pointer; appearance: none;
    background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23888' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat; background-position: right 10px center;
  }
  .sort-select:focus { border-color: var(--red); }

  .category-chips { display: flex; flex-wrap: wrap; gap: 5px; }
  .chip {
    padding: 4px 11px; border-radius: 100px; font-size: 12px; font-weight: 500;
    border: 1px solid var(--border); background: transparent; color: var(--muted);
    cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif;
  }
  .chip:hover { border-color: var(--border-hover); color: var(--text); }
  .chip.active { background: var(--red); border-color: var(--red); color: white; }

  .filter-divider { height: 1px; background: var(--border); }

  .main { padding: 1.25rem 1.75rem; overflow-y: auto; }
  .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 8px; }
  .results-count { font-size: 13px; color: var(--muted); }
  .results-count strong { color: var(--text); }

  .pagination { display: flex; align-items: center; gap: 8px; }
  .page-btn {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
    padding: 5px 12px; color: var(--text); font-size: 13px; cursor: pointer;
    font-family: 'DM Sans', sans-serif; transition: border-color 0.15s;
  }
  .page-btn:hover { border-color: var(--border-hover); }
  .page-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .page-info { font-size: 12px; color: var(--muted); }

  .active-filters { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 0.75rem; }
  .active-filter-tag {
    display: flex; align-items: center; gap: 5px; padding: 4px 10px;
    background: rgba(255,45,45,0.1); border: 1px solid rgba(255,45,45,0.25);
    border-radius: 100px; font-size: 12px; color: #FF6B6B;
  }
  .remove-filter { background: none; border: none; color: #FF6B6B; cursor: pointer; font-size: 14px; line-height: 1; padding: 0; opacity: 0.7; }
  .remove-filter:hover { opacity: 1; }

  .channels-grid { display: flex; flex-direction: column; gap: 8px; }
  .channel-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 1rem 1.15rem; display: grid; grid-template-columns: 52px 1fr auto;
    gap: 1rem; align-items: start; transition: border-color 0.2s, background 0.2s;
    cursor: pointer; text-decoration: none; color: inherit;
  }
  .channel-card:hover { border-color: var(--border-hover); background: var(--surface2); }

  .channel-avatar {
    width: 52px; height: 52px; border-radius: 50%; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 18px; flex-shrink: 0;
  }
  .channel-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

  .channel-info { flex: 1; min-width: 0; }
  .channel-name { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .channel-meta { font-size: 12px; color: var(--muted); margin-bottom: 7px; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .channel-desc { font-size: 13px; color: var(--muted); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  .channel-stats { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
  .stat-pill {
    display: flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 500;
    padding: 4px 10px; border-radius: 100px; background: var(--surface2);
    border: 1px solid var(--border); white-space: nowrap;
  }
  .stat-dot { width: 6px; height: 6px; border-radius: 50%; }
  .country-tag { font-size: 11px; padding: 2px 7px; border-radius: 4px; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); }

  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5rem 2rem; text-align: center; gap: 0.75rem; }
  .empty-icon { width: 60px; height: 44px; background: var(--surface2); border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 0.5rem; }
  .empty-icon::after { content: ''; border-left: 16px solid var(--muted2); border-top: 10px solid transparent; border-bottom: 10px solid transparent; margin-left: 3px; }
  .empty-title { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 600; }
  .empty-desc { font-size: 13px; color: var(--muted); max-width: 280px; line-height: 1.6; }

  .loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 4rem; gap: 1rem; }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--surface2); border-top-color: var(--red); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; color: var(--muted); }

  .error-banner { padding: 1rem 1.25rem; background: rgba(255,45,45,0.07); border: 1px solid rgba(255,45,45,0.2); border-radius: 10px; color: #FF6B6B; font-size: 13px; line-height: 1.6; }
  .error-banner strong { display: block; margin-bottom: 4px; font-family: 'Syne', sans-serif; font-size: 14px; }
  .no-results { text-align: center; padding: 3rem; color: var(--muted); font-size: 14px; }
  @media (max-width: 700px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon"></div>
    <div class="logo-text">Channel<span>Finder</span></div>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="search-box">
      <input type="text" class="search-input" id="searchInput" placeholder="Search channels…" />
      <button class="search-btn" id="searchBtn" onclick="doSearch()">Search</button>
    </div>

    <div class="filter-group">
      <div class="filter-label">Category</div>
      <div class="category-chips" id="categoryChips">
        <button class="chip active" data-cat="Any" onclick="toggleCat(this)">Any</button>
        <button class="chip" data-cat="Gaming" onclick="toggleCat(this)">Gaming</button>
        <button class="chip" data-cat="Tech" onclick="toggleCat(this)">Tech</button>
        <button class="chip" data-cat="Music" onclick="toggleCat(this)">Music</button>
        <button class="chip" data-cat="Education" onclick="toggleCat(this)">Education</button>
        <button class="chip" data-cat="Comedy" onclick="toggleCat(this)">Comedy</button>
        <button class="chip" data-cat="Vlogs" onclick="toggleCat(this)">Vlogs</button>
        <button class="chip" data-cat="Food" onclick="toggleCat(this)">Food</button>
        <button class="chip" data-cat="Sports" onclick="toggleCat(this)">Sports</button>
        <button class="chip" data-cat="Science" onclick="toggleCat(this)">Science</button>
        <button class="chip" data-cat="Finance" onclick="toggleCat(this)">Finance</button>
        <button class="chip" data-cat="News" onclick="toggleCat(this)">News</button>
      </div>
    </div>

    <div class="filter-divider"></div>

    <div class="filter-group">
      <div class="filter-label">Subscribers</div>
      <div class="filter-row">
        <input type="text" class="filter-input" id="subMin" placeholder="Min e.g. 10k" oninput="onFilterChange()" />
        <input type="text" class="filter-input" id="subMax" placeholder="Max e.g. 5M" oninput="onFilterChange()" />
      </div>
    </div>

    <div class="filter-group">
      <div class="filter-label">Total Views</div>
      <div class="filter-row">
        <input type="text" class="filter-input" id="viewMin" placeholder="Min e.g. 1M" oninput="onFilterChange()" />
        <input type="text" class="filter-input" id="viewMax" placeholder="Max e.g. 1B" oninput="onFilterChange()" />
      </div>
      <div class="filter-hint">YouTube API provides total views, not per-video average</div>
    </div>

    <div class="filter-group">
      <div class="filter-label">Last Upload</div>
      <select class="sort-select" id="recentUpload" onchange="onRecentFilterChange()">
        <option value="any">Any time</option>
        <option value="7">Within 7 days</option>
        <option value="30">Within 30 days</option>
        <option value="90">Within 90 days</option>
        <option value="365">Within 1 year</option>
      </select>
      <div class="filter-hint" id="recentHint" style="display:none;">Fetching upload dates…</div>
    </div>

    <div class="filter-group">
      <div class="filter-label">Sort By</div>
      <select class="sort-select" id="sortBy" onchange="onFilterChange()">
        <option value="relevance">Relevance</option>
        <option value="subs_desc">Subscribers (high → low)</option>
        <option value="subs_asc">Subscribers (low → high)</option>
        <option value="views_desc">Total Views (high → low)</option>
        <option value="views_asc">Total Views (low → high)</option>
        <option value="videos_desc">Video Count (high → low)</option>
        <option value="recent_desc">Last Upload (newest first)</option>
      </select>
    </div>
  </aside>

  <main class="main">
    <div id="resultsHeader" class="results-header" style="display:none;">
      <div class="results-count" id="resultsCount"></div>
      <div class="pagination">
        <button class="page-btn" id="prevBtn" onclick="prevPage()" disabled>← Prev</button>
        <span class="page-info" id="pageInfo"></span>
        <button class="page-btn" id="nextBtn" onclick="nextPage()" disabled>Next →</button>
      </div>
    </div>
    <div id="activeFilters" class="active-filters"></div>
    <div id="results">
      <div class="empty-state">
        <div class="empty-icon"></div>
        <div class="empty-title">Find YouTube Channels</div>
        <div class="empty-desc">Search for channels by topic, name, or keyword. Filter results by subscribers and views.</div>
      </div>
    </div>
  </main>
</div>

<script>
const API_KEY = 'AIzaSyA-obcMXsvZShpgjHVDxPqCtwb5EfoaYvU';
const YT_SEARCH_URL = 'https://www.googleapis.com/youtube/v3/search';
const YT_CHANNELS_URL = 'https://www.googleapis.com/youtube/v3/channels';

let allChannels = [];
let filteredChannels = [];
let pageTokens = [null];
let currentPage = 0;
let selectedCat = 'Any';

const AVATAR_COLORS = [
  ['#FF2D2D','#FF6B6B'],['#2D6BFF','#6B9BFF'],['#FFB82D','#FF6B00'],
  ['#B82DFF','#6B00FF'],['#2DFF8F','#0A8A4B'],['#FF2DB8','#8A0A5A'],
  ['#8AFF2D','#3A8A00'],['#2DFFFF','#0A8A8A']
];

function avatarColor(id) {
  let h = 0; for (let c of id) h = (h * 31 + c.charCodeAt(0)) & 0xFFFFFF;
  return AVATAR_COLORS[h % AVATAR_COLORS.length];
}

function parseSuffix(val) {
  if (!val || !val.trim()) return null;
  val = val.trim().toUpperCase().replace(/,/g,'');
  if (val.endsWith('B')) return parseFloat(val) * 1e9;
  if (val.endsWith('M')) return parseFloat(val) * 1e6;
  if (val.endsWith('K')) return parseFloat(val) * 1e3;
  const n = parseFloat(val); return isNaN(n) ? null : n;
}

function formatNum(n) {
  if (!n && n !== 0) return '—';
  n = parseInt(n, 10);
  if (n >= 1e9) return (n/1e9).toFixed(1).replace(/\.0$/,'') + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(1).replace(/\.0$/,'') + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1).replace(/\.0$/,'') + 'K';
  return n.toLocaleString();
}

function toggleCat(btn) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  selectedCat = btn.dataset.cat;
  if (allChannels.length) applyFiltersAndRender();
}

function onFilterChange() {
  if (allChannels.length) applyFiltersAndRender();
}

function onRecentFilterChange() {
  const days = document.getElementById('recentUpload').value;
  if (days === 'any' || allChannels.every(ch => ch.lastUpload !== undefined)) {
    applyFiltersAndRender();
  } else {
    fetchLastUploads().then(() => applyFiltersAndRender());
  }
}

async function fetchLastUploads() {
  const hint = document.getElementById('recentHint');
  hint.style.display = 'block';
  const YT_SEARCH = 'https://www.googleapis.com/youtube/v3/search';
  await Promise.all(allChannels.map(async ch => {
    if (ch.lastUpload !== undefined) return;
    try {
      const p = new URLSearchParams({ part: 'snippet', channelId: ch.id, order: 'date', maxResults: 1, type: 'video', key: API_KEY });
      const r = await fetch(YT_SEARCH + '?' + p);
      const d = await r.json();
      ch.lastUpload = d.items?.[0]?.snippet?.publishedAt ? new Date(d.items[0].snippet.publishedAt) : null;
    } catch { ch.lastUpload = null; }
  }));
  hint.style.display = 'none';
}

async function doSearch(pageToken) {
  const query = document.getElementById('searchInput').value.trim();
  if (!query) return;

  if (!pageToken) { pageTokens = [null]; currentPage = 0; }

  const btn = document.getElementById('searchBtn');
  btn.disabled = true; btn.textContent = '…';
  document.getElementById('resultsHeader').style.display = 'none';
  document.getElementById('activeFilters').innerHTML = '';
  document.getElementById('results').innerHTML = `<div class="loading-state"><div class="spinner"></div><div class="loading-text">Searching YouTube…</div></div>`;

  try {
    const searchParams = new URLSearchParams({
      part: 'snippet',
      q: query + (selectedCat !== 'Any' ? ' ' + selectedCat : ''),
      type: 'channel', maxResults: 25, key: API_KEY,
      ...(pageToken ? { pageToken } : {})
    });

    const searchRes = await fetch(`${YT_SEARCH_URL}?${searchParams}`);
    const searchData = await searchRes.json();
    if (searchData.error) throw new Error(searchData.error.message);

    const channelIds = searchData.items.map(i => i.snippet.channelId || i.id.channelId).join(',');
    if (!channelIds) { allChannels = []; applyFiltersAndRender(); return; }

    if (searchData.nextPageToken && pageTokens.length <= currentPage + 1)
      pageTokens.push(searchData.nextPageToken);

    const statsParams = new URLSearchParams({
      part: 'snippet,statistics', id: channelIds, key: API_KEY
    });
    const statsRes = await fetch(`${YT_CHANNELS_URL}?${statsParams}`);
    const statsData = await statsRes.json();
    if (statsData.error) throw new Error(statsData.error.message);

    allChannels = statsData.items.map(ch => ({
      id: ch.id,
      name: ch.snippet.title,
      handle: ch.snippet.customUrl ? '@' + ch.snippet.customUrl.replace('@','') : '',
      description: ch.snippet.description || '',
      thumbnail: ch.snippet.thumbnails?.medium?.url || ch.snippet.thumbnails?.default?.url || '',
      country: ch.snippet.country || '',
      subscribers: ch.statistics.hiddenSubscriberCount ? null : parseInt(ch.statistics.subscriberCount || 0),
      totalViews: parseInt(ch.statistics.viewCount || 0),
      videoCount: parseInt(ch.statistics.videoCount || 0),
      hiddenSubs: !!ch.statistics.hiddenSubscriberCount,
      url: `https://www.youtube.com/channel/${ch.id}`
    }));

    applyFiltersAndRender();
  } catch(err) {
    let msg = err.message || 'Unknown error';
    let hint = '';
    if (msg.includes('quotaExceeded')) hint = 'Daily API quota exceeded. Try again tomorrow.';
    else if (msg.includes('keyInvalid') || msg.includes('API key not valid')) hint = 'API key is invalid.';
    else if (msg.includes('403')) hint = 'API key lacks permission. Ensure YouTube Data API v3 is enabled.';
    document.getElementById('results').innerHTML = `<div class="error-banner"><strong>API Error</strong>${hint || msg}</div>`;
    document.getElementById('resultsHeader').style.display = 'none';
  }

  btn.disabled = false; btn.textContent = 'Search';
}

function applyFiltersAndRender() {
  const sortBy = document.getElementById('sortBy').value;
  const subMin = parseSuffix(document.getElementById('subMin').value);
  const subMax = parseSuffix(document.getElementById('subMax').value);
  const viewMin = parseSuffix(document.getElementById('viewMin').value);
  const viewMax = parseSuffix(document.getElementById('viewMax').value);

  const days = parseInt(document.getElementById('recentUpload').value) || 0;
  const cutoff = days ? new Date(Date.now() - days * 86400000) : null;

  filteredChannels = allChannels.filter(ch => {
    if (!ch.hiddenSubs) {
      if (subMin !== null && ch.subscribers < subMin) return false;
      if (subMax !== null && ch.subscribers > subMax) return false;
    }
    if (viewMin !== null && ch.totalViews < viewMin) return false;
    if (viewMax !== null && ch.totalViews > viewMax) return false;
    if (cutoff && ch.lastUpload !== undefined) {
      if (!ch.lastUpload || ch.lastUpload < cutoff) return false;
    }
    return true;
  });

  if (sortBy === 'subs_desc') filteredChannels.sort((a,b) => (b.subscribers||0)-(a.subscribers||0));
  else if (sortBy === 'subs_asc') filteredChannels.sort((a,b) => (a.subscribers||0)-(b.subscribers||0));
  else if (sortBy === 'views_desc') filteredChannels.sort((a,b) => b.totalViews-a.totalViews);
  else if (sortBy === 'views_asc') filteredChannels.sort((a,b) => a.totalViews-b.totalViews);
  else if (sortBy === 'videos_desc') filteredChannels.sort((a,b) => b.videoCount-a.videoCount);
  else if (sortBy === 'recent_desc') filteredChannels.sort((a,b) => (b.lastUpload||0)-(a.lastUpload||0));

  renderActiveFilters(subMin, subMax, viewMin, viewMax, cutoff, days);
  renderChannels();
  updatePagination();
}

function renderActiveFilters(subMin, subMax, viewMin, viewMax, cutoff, days) {
  const c = document.getElementById('activeFilters'); c.innerHTML = '';
  const add = (label, fn) => {
    const el = document.createElement('div'); el.className = 'active-filter-tag';
    el.innerHTML = `${label} <button class="remove-filter" onclick="${fn}">×</button>`;
    c.appendChild(el);
  };
  if (subMin !== null || subMax !== null)
    add(`Subs: ${subMin ? formatNum(subMin) : '0'} – ${subMax ? formatNum(subMax) : '∞'}`, "clearFilter('sub')");
  if (viewMin !== null || viewMax !== null)
    add(`Views: ${viewMin ? formatNum(viewMin) : '0'} – ${viewMax ? formatNum(viewMax) : '∞'}`, "clearFilter('view')");
  if (cutoff)
    add(`Uploaded within ${days}d`, "clearFilter('recent')");
}

function clearFilter(type) {
  if (type === 'sub') { document.getElementById('subMin').value=''; document.getElementById('subMax').value=''; }
  if (type === 'recent') { document.getElementById('recentUpload').value='any'; }
  if (type === 'view') { document.getElementById('viewMin').value=''; document.getElementById('viewMax').value=''; }
  if (allChannels.length) applyFiltersAndRender();
}

function renderChannels() {
  const header = document.getElementById('resultsHeader');
  const count = document.getElementById('resultsCount');
  const results = document.getElementById('results');
  header.style.display = 'flex';
  count.innerHTML = `<strong>${filteredChannels.length}</strong> of ${allChannels.length} channels`;

  if (!filteredChannels.length) {
    results.innerHTML = `<div class="no-results">No channels match your current filters.</div>`; return;
  }

  results.innerHTML = `<div class="channels-grid">${filteredChannels.map(ch => {
    const [bg] = avatarColor(ch.id);
    const initials = ch.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const subsColor = !ch.hiddenSubs && ch.subscribers >= 1e6 ? '#FFB82D' : ch.subscribers >= 100000 ? '#2DFF8F' : '#888';
    const viewsColor = ch.totalViews >= 1e9 ? '#FF2D2D' : ch.totalViews >= 1e8 ? '#FFB82D' : '#888';
    const avatarInner = ch.thumbnail
      ? `<img src="${ch.thumbnail}" alt="" onerror="this.style.display='none'" />`
      : initials;
    const avatarStyle = ch.thumbnail ? '' : `background:${bg}20;color:${bg};border:1.5px solid ${bg}40;`;

    return `<a class="channel-card" href="${ch.url}" target="_blank" rel="noopener">
      <div class="channel-avatar" style="${avatarStyle}">${avatarInner}</div>
      <div class="channel-info">
        <div class="channel-name">${escHtml(ch.name)}</div>
        <div class="channel-meta">${ch.handle ? `<span>${escHtml(ch.handle)}</span>` : ''}${ch.country ? `<span class="country-tag">${ch.country}</span>` : ''}</div>
        <div class="channel-desc">${escHtml(ch.description.slice(0,180))}</div>
      </div>
      <div class="channel-stats">
        <div class="stat-pill"><div class="stat-dot" style="background:${subsColor}"></div>${ch.hiddenSubs ? 'Subs hidden' : formatNum(ch.subscribers)+' subs'}</div>
        <div class="stat-pill"><div class="stat-dot" style="background:${viewsColor}"></div>${formatNum(ch.totalViews)} views</div>
        <div class="stat-pill" style="color:var(--muted);font-size:11px;">${formatNum(ch.videoCount)} videos</div>
        ${ch.lastUpload ? \`<div class=\"stat-pill\" style=\"color:var(--muted);font-size:11px;\">Last: \${ch.lastUpload.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div>\` : ''}
      </div>
    </a>`;
  }).join('')}</div>`;
}

function updatePagination() {
  document.getElementById('prevBtn').disabled = currentPage === 0;
  document.getElementById('nextBtn').disabled = !pageTokens[currentPage + 1];
  document.getElementById('pageInfo').textContent = `Page ${currentPage + 1}`;
}

function prevPage() { if (currentPage > 0) { currentPage--; doSearch(pageTokens[currentPage]); } }
function nextPage() { if (pageTokens[currentPage+1]) { currentPage++; doSearch(pageTokens[currentPage]); } }

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key==='Enter') doSearch(); });
</script>
</body>
</html>
